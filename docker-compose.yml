version: '3.8'

services:
  # Nosso Projeto CRM Django
  crm-ladrilho:
    build: .
    container_name: crm-ladrilho
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - /app/.venv
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy

  # Webhook Assíncrono (FastAPI) para processar as respostas do Agente
  webhook-crm:
    build: .
    container_name: webhook-crm
    command: sh -c "cd cadastro && uvicorn webhook:app --host 0.0.0.0 --port 8001"
    ports:
      - "8001:8001"
    volumes:
      - .:/app
      - /app/.venv
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy

  # Evolution API v2
  evolution-api:
    image: evoapicloud/evolution-api:v2.3.7
    container_name: evolution-api
    restart: always
    ports:
      - "8080:8080"
    env_file:
      - .env
    volumes:
      - evolution_instances:/evolution/instances
      - evolution_store:/evolution/store
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Banco de Dados PostgreSQL (Usado pela Evolution e futuramente pelo CRM)
  postgres:
    image: postgres:15-alpine
    container_name: postgres-db
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis (Cache para Evolution API)
  redis:
    image: redis:7-alpine
    container_name: redis-cache
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  evolution_instances:
  evolution_store:
